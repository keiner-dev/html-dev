<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <h1>Calculadora de Suma</h1>

        <input type="number" id="numero1" placeholder="Ingresa el primer número">

        <input type="number" id="numero2" placeholder="Ingresa el segundo número">

        <button onclick="sumar()">Sumar</button>

        <p id="resultado"></p>
    </div>

    <script>
        function sumar() {
            var num1 = document.getElementById('numero1').value;
            var num2 = document.getElementById('numero2').value;

            var suma = Number(num1) + Number(num2);

            document.getElementById('resultado').innerText = 'Resultado: ' + suma;
        }
    </script>
</body>
